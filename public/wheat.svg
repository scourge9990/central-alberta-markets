<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="48" fill="#003594" stroke="#FFEB43" stroke-width="3"/>
  <g fill="#FFEB43">
    <!-- Stem -->
    <rect x="47" y="30" width="6" height="45"/>
    <!-- Top grain -->
    <ellipse cx="50" cy="28" rx="10" ry="8"/>
    <!-- Left grain -->
    <ellipse cx="35" cy="40" rx="8" ry="10" transform="rotate(-30 35 40)"/>
    <!-- Right grain -->
    <ellipse cx="65" cy="40" rx="8" ry="10" transform="rotate(30 65 40)"/>
    <!-- Left lower grain -->
    <ellipse cx="32" cy="58" rx="7" ry="9" transform="rotate(-20 32 58)"/>
    <!-- Right lower grain -->
    <ellipse cx="68" cy="58" rx="7" ry="9" transform="rotate(20 68 58)"/>
  </g>
</svg>